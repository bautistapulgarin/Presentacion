<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidado Tour IA — Ingeurbe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f9fb; --bg2:#ffffff; --bg3:#f1f3f7; --bg4:#e4e7ef;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1d27; --text2:#4a5068; --text3:#8b90a0;
  --green:#0d7f5f; --green-bg:rgba(13,127,95,0.08); --green-border:rgba(13,127,95,0.22);
  --blue:#1a5fbf; --blue-bg:rgba(26,95,191,0.08); --blue-border:rgba(26,95,191,0.22);
  --amber:#a06000; --amber-bg:rgba(160,96,0,0.08); --amber-border:rgba(160,96,0,0.22);
  --coral:#c0303a; --coral-bg:rgba(192,48,58,0.08); --coral-border:rgba(192,48,58,0.22);
  --purple:#6b3fa0; --purple-bg:rgba(107,63,160,0.08); --purple-border:rgba(107,63,160,0.22);
  --radius:10px; --radius-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.012'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.shell{max-width:1140px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1;}

/* HERO */
.hero{padding:60px 0 44px;border-bottom:1px solid var(--border);margin-bottom:0;}
.hero-meta{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:18px;}
.hero-meta span{color:var(--green);}
.hero h1{font-size:clamp(26px,3.8vw,44px);font-weight:600;line-height:1.15;color:var(--text);max-width:720px;margin-bottom:14px;}
.hero h1 em{font-style:normal;color:var(--green);}
.hero-sub{font-size:14px;color:var(--text2);max-width:600px;line-height:1.7;}
.hero-stats{display:flex;gap:28px;flex-wrap:wrap;margin-top:32px;padding-top:28px;border-top:1px solid var(--border);}
.stat-num{font-size:26px;font-weight:600;color:var(--text);line-height:1;}
.stat-num span{color:var(--green);}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;}

/* NAV */
.nav{display:flex;gap:4px;flex-wrap:wrap;padding:12px 0;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid var(--border);margin-bottom:36px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.nav-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.nav-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-btn.active{background:var(--green);border-color:var(--green);color:#ffffff;font-weight:600;}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* FREQ TABLE */
.freq-table{width:100%;border-collapse:collapse;}
.freq-table tr.freq-row{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
.freq-table tr.freq-row:hover{background:var(--bg2);}
.freq-table td{padding:11px 8px;vertical-align:middle;}
.freq-rank{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);width:30px;text-align:center;}
.freq-name{font-size:13px;font-weight:500;color:var(--text);}
.freq-dots{display:flex;gap:5px;justify-content:center;width:92px;}
.dot{width:11px;height:11px;border-radius:50%;}
.dot-rl{background:var(--green);}
.dot-vi{background:var(--blue);}
.dot-ma{background:var(--coral);}
.dot-am{background:var(--purple);}
.dot-cons{background:var(--amber);}
.dot-empty{background:#d0d4de;border:1px solid var(--border2);}

/* DESGLOSE STYLES */
.freq-detail{display:none;background:#fcfdfe;}
.freq-detail.active{display:table-row;}
.detail-content{padding:15px 40px !important;border-bottom:1px solid var(--border);}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:12px;}
.detail-card{background:#fff;border:1px solid var(--border);padding:10px;border-radius:6px;font-size:12px;}
.detail-proj{font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.detail-obs{color:var(--text2);font-style:italic;}

/* GENERAL STYLES FROM INDEX */
.pain-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;border-left:4px solid transparent;}
.pain-card.comun{border-left-color:var(--green);}
.pain-card.nuevo{border-left-color:var(--blue);}
.pain-card.profun{border-left-color:var(--purple);}
.pain-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:8px;display:inline-block;}
.pt-comun{background:var(--green-bg);color:var(--green);}
.pt-nuevo{background:var(--blue-bg);color:var(--blue);}
.pt-profun{background:var(--purple-bg);color:var(--purple);}
.pain-title{font-weight:600;margin-bottom:4px;}
.pain-desc{font-size:13px;color:var(--text2);}
.pain-init{display:block;margin-top:8px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

</style>
</head>
<body>

<div class="shell">
  <header class="hero">
    <div class="hero-meta">TOUR IA <span>●</span> BOGOTÁ 2026</div>
    <h1>Consolidado de <em>Observaciones</em> en Obra</h1>
    <p class="hero-sub">Análisis sistemático de ineficiencias y oportunidades de mejora detectadas en los proyectos visitados.</p>
    <div class="hero-stats">
      <div class="stat-card">
        <div class="stat-num">5</div>
        <div class="stat-label">Proyectos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="total-obs">0</div>
        <div class="stat-label">Observaciones</div>
      </div>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showPanel('frecuencia')">Por Frecuencia</button>
    <button class="nav-btn" onclick="showPanel('proyectos')">Por Proyecto</button>
  </nav>

  <div id="frecuencia" class="panel active">
    <table class="freq-table" id="freq-body">
      </table>
  </div>

  <div id="proyectos" class="panel">
    <div id="proyectos-container">
      </div>
  </div>
</div>

<script>
// DATOS CONSOLIDADOS (De index.html)
const PROYECTOS = [
  { id:'rl', name:'Reserva del Lago', short:'RL', color:'var(--green)' },
  { id:'vi', name:'Vivant', short:'VI', color:'var(--blue)' },
  { id:'ma', name:'Mazzaro', short:'MA', color:'var(--coral)' },
  { id:'am', name:'Amalfi', short:'AM', color:'var(--purple)' },
  { id:'cons', name:'Constantino', short:'CONS', color:'var(--amber)' }
];

const SESIONES = [
  {
    proyecto: 'Reserva del Lago',
    tag: 'RL',
    dolores: [
      { tag:'Planificación', tipo:'comun', title:'Incumplimiento del plan semanal', desc:'No se cumplen las metas establecidas por falta de recursos.', init:'Seguimiento diario' },
      { tag:'Logística', tipo:'nuevo', title:'Acopio desordenado', desc:'Materiales obstaculizan el flujo de trabajo.', init:'5S en obra' }
    ],
    mejoras: []
  },
  {
    proyecto: 'Vivant',
    tag: 'VI',
    dolores: [
      { tag:'Planificación', tipo:'comun', title:'Falta de secuenciación', desc:'Actividades se cruzan sin orden lógico.', init:'LPS' },
      { tag:'Calidad', tipo:'profun', title:'Reprocesos en muros', desc:'Plomos mal ejecutados requieren corrección.', init:'Checklist' }
    ],
    mejoras: []
  },
  {
    proyecto: 'Mazzaro',
    tag: 'MA',
    dolores: [
      { tag:'Planificación', tipo:'comun', title:'Retraso en suministros', desc:'Proveedor no entrega a tiempo el concreto.', init:'Gestión compras' }
    ],
    mejoras: []
  }
  // Añadir aquí el resto de sesiones del index original...
];

function init() {
  renderFrecuencia();
  renderProyectos();
  updateStats();
}

function renderFrecuencia() {
  const map = {};
  SESIONES.forEach(s => {
    s.dolores.forEach(d => {
      if(!map[d.title]) map[d.title] = { count: 0, details: [], tag: d.tag };
      map[d.title].count++;
      map[d.title].details.push({ proj: s.proyecto, desc: d.desc, tag: s.tag });
    });
  });

  const sorted = Object.entries(map).sort((a,b) => b[1].count - a[1].count);
  const html = sorted.map(([title, data], i) => `
    <tr class="freq-row" onclick="toggleDetail(${i})">
      <td class="freq-rank">${String(i+1).padStart(2,'0')}</td>
      <td>
        <div class="freq-name">${title}</div>
        <div class="freq-sub">${data.tag}</div>
      </td>
      <td class="freq-dots">${renderDots(data.details)}</td>
      <td><span class="freq-badge badge-${Math.min(data.count, 5)}">${data.count} Proyectos</span></td>
    </tr>
    <tr class="freq-detail" id="detail-${i}">
      <td colspan="4" class="detail-content">
        <div class="detail-grid">
          ${data.details.map(det => `
            <div class="detail-card">
              <div class="detail-proj"><span class="dot dot-${det.tag.toLowerCase()}"></span> ${det.proj}</div>
              <div class="detail-obs">${det.desc}</div>
            </div>
          `).join('')}
        </div>
      </td>
    </tr>
  `).join('');
  
  document.getElementById('freq-body').innerHTML = html;
}

function renderDots(details) {
  const activeTags = details.map(d => d.tag.toLowerCase());
  return PROYECTOS.map(p => {
    const isPresent = activeTags.includes(p.id);
    return `<div class="dot ${isPresent ? 'dot-'+p.id : 'dot-empty'}"></div>`;
  }).join('');
}

function renderProyectos() {
  const container = document.getElementById('proyectos-container');
  container.innerHTML = SESIONES.map(s => `
    <div class="area-section">
      <div class="area-header">${s.proyecto}</div>
      <div class="init-grid">
        ${s.dolores.map(d => `
          <div class="pain-card ${d.tipo}">
            <span class="pain-tag pt-${d.tipo}">${d.tag}</span>
            <div class="pain-title">${d.title}</div>
            <div class="pain-desc">${d.desc}</div>
            <span class="pain-init">→ Propuesta: ${d.init}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleDetail(id) {
  const el = document.getElementById(`detail-${id}`);
  el.classList.toggle('active');
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function updateStats() {
  let total = 0;
  SESIONES.forEach(s => total += s.dolores.length);
  document.getElementById('total-obs').innerText = total;
}

window.onload = init;
</script>

</body>
</html>
